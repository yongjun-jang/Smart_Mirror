<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Smart Mirror - 소지품 체크</title>
    <style>
        body { 
            margin: 20px; 
            font-family: 'Noto Sans KR', sans-serif; 
            background: #000000; 
            color: #ffffff; 
            overflow: hidden; 
        }

        .top { 
            display: flex; 
            align-items: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
        }

        .title { 
            font-size: 24px; 
            font-weight: 700; 
            color: #4fa3f7; 
        }

        /* 체크리스트 컨테이너 */
        .check-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        /* 체크 항목 카드 */
        .check-item {
            background: #111826;
            border: 2px solid #1f2a3a;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        /* 체크 완료 상태 */
        .check-item.active {
            border-color: #4fa3f7;
            background: #172235;
        }

        .check-item.active .icon {
            color: #4fa3f7;
        }

        .icon {
            font-size: 30px;
            color: #333;
        }

        /* 하단 확인 버튼 */
        .btn-confirm { 
            padding: 20px; 
            border-radius: 15px; 
            border: none; 
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); 
            color: #fff; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-confirm:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="top">
        <div class="title">🎒 외출 전 소지품 체크</div>
    </div>

    <div class="check-container">
        <div class="check-item" onclick="toggleCheck(this)">
            <span class="icon">✔</span> 📱 스마트폰
        </div>
        <div class="check-item" onclick="toggleCheck(this)">
            <span class="icon">✔</span> 🔑 지갑 / 카드
        </div>
        <div class="check-item" onclick="toggleCheck(this)">
            <span class="icon">✔</span> 🎧 이어폰
        </div>
        <div class="check-item" onclick="toggleCheck(this)">
            <span class="icon">✔</span> 🕶️ 안경 / 선글라스
        </div>
        
        {% if weather.is_rain or weather.is_snow or precip_prob > 0.5 %}
        <div class="check-item" style="border-color: #ff4a4a;" onclick="toggleCheck(this)">
            <span class="icon" style="color: #ff4a4a;">☂️</span> 우산 챙기기
        </div>
        {% endif %}
    </div>

<button class="btn-confirm" onclick="submitChecklistAndGo()">
    모두 챙겼습니다! 외출 시작 ➔
</button>

    <script>
    function toggleCheck(el) {
        el.classList.toggle('active');
    }

    function submitChecklistAndGo() {
        const items = document.querySelectorAll('.check-container > div');
        const total = items.length;
        const done = document.querySelectorAll('.check-container > div.active').length;

        fetch("/api/checklist_done", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ total: total, done: done })
        }).finally(() => {
            window.location.href = "/departure_score";
        });
    }
    </script>



</body>
</html>
